kind = "web"
previewPath = "/"
title = "Search Engine"
version = "1.0.0"
id = "artifacts/proxy-search"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20325

[services.development]
run = "pnpm --filter @workspace/proxy-search run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/proxy-search", "run", "build" ]
publicDir = "artifacts/proxy-search/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20325"
BASE_PATH = "/"
